name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (apps and packages must stay clean)
        run: npx eslint "apps/**/*.{ts,tsx,mjs}" "packages/**/*.{ts,tsx,mjs}" --max-warnings 0

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Contract tests
        run: npm run test:contract

      - name: Integration tests
        run: npm run test:integration

      - name: Failure tests
        run: npm run test:failure

      - name: Security tests
        run: npm run test:security

      - name: Worker tests
        run: npm run test:worker

      - name: Dependency audit gate
        run: npm run audit:gate

      - name: Validate Prisma schema
        run: npm run db:validate

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?sslmode=disable
          DIRECT_URL: postgresql://ci:ci@localhost:5432/ci?sslmode=disable
          SESSION_SECRET: ci-session-secret-minimum-32-characters
          AUTH_SECRET: ci-auth-secret-minimum-32-characters

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  e2e:
    name: Playwright smoke
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright smoke tests
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?sslmode=disable
          DIRECT_URL: postgresql://ci:ci@localhost:5432/ci?sslmode=disable
          SESSION_SECRET: ci-session-secret-minimum-32-characters
          AUTH_SECRET: ci-auth-secret-minimum-32-characters

  docker-smoke:
    name: Docker build smoke
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t society-connect-api:ci .

      - name: Build worker image
        run: docker build -f apps/worker/Dockerfile -t society-connect-worker:ci .

      - name: Build web image
        run: docker build -f Dockerfile.web -t society-connect-web:ci .
